    <!-- Connecting lines -->
    <line x1="-5.09" y1="-7.41" x2="-1.18" y2="-3.5"/>
    <line x1="5.09" y1="-7.41" x2="1.18" y2="-3.5"/>
    <line x1="-8.41" y1="2.09" x2="-3.5" y2="1.18"/>
