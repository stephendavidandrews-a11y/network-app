    <!-- Central circle -->
    <circle cx="0" cy="0" r="3.5" fill="white" stroke="none"/>

    <!-- Outer circles -->
    <circle cx="-6.5" cy="-8.82" r="2.5" fill="white" stroke="none"/>
    <circle cx="6.5" cy="-8.82" r="2.5" fill="white" stroke="none"/>
    <circle cx="-9.82" cy="3.5" r="2.5" fill="white" stroke="none"/>
    <circle cx="9.82" cy="3.5" r="2.5" fill="white" stroke="none"/>
    <circle cx="-3.5" cy="9.82" r="2.5" fill="white" stroke="none"/>
    <circle cx="3.5" cy="9.82" r="2.5" fill="white" stroke="none"/>
