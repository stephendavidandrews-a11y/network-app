<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#2563eb"/>

  <!-- Network icon in white, scaled up from lucide's 24x24 to fill the space -->
